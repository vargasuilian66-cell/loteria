<script>
function generarCarton(numeroCarton) {
  let numeros = [];
  let usados = {};

  let seed = numeroCarton;

  while (numeros.length < 25) {
    seed = (seed * 9301 + 49297) % 233280;
    let n = Math.floor(seed / 233280 * 90) + 1;

    if (!usados[n]) {
      numeros.push(n);
      usados[n] = true;
    }
  }

  let tabla = document.getElementById("carton");
  tabla.innerHTML = "";

  for (let i = 0; i < 5; i++) {
    let fila = "<tr>";
    for (let j = 0; j < 5; j++) {
      let num = numeros[i * 5 + j];
      fila += `<td onclick="marcar(this)">${num}</td>`;
    }
    fila += "</tr>";
    tabla.innerHTML += fila;
  }
}

function marcar(celda) {
  celda.classList.toggle("activo");
}

// 👉 Obtener número desde la URL
function obtenerCarton() {
  let url = new URL(window.location.href);
  let num = url.searchParams.get("carton");

  // Si no hay número → poner 1 por defecto
  if (!num) {
    num = 1;
  }

  return parseInt(num);
}

// INICIO
let numero = obtenerCarton();
generarCarton(numero);
</script>
