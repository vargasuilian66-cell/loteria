<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial; text-align: center; }
.grid {
  display: grid;
  grid-template-columns: repeat(5, 60px);
  gap: 5px;
  justify-content: center;
}
.cell {
  width: 60px;
  height: 60px;
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
  border-radius: 10px;
}
.marked {
  background: green;
  color: white;
}
button {
  margin: 10px;
  padding: 10px;
}
</style>
</head>
<body>

<h2>Cartón Lotería Paraguaya</h2>

<button onclick="generar()">Nuevo Cartón</button>

<div class="grid" id="grid"></div>

<script>
function generar() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let numeros = [];
  while(numeros.length < 24){
    let n = Math.floor(Math.random() * 99) + 1;
    if(!numeros.includes(n)){
      numeros.push(n);
    }
  }

  numeros.splice(12, 0, "FREE");

  numeros.forEach(num => {
    let div = document.createElement("div");
    div.className = "cell";
    div.innerText = num;
    div.onclick = function() {
      div.classList.toggle("marked");
    };
    grid.appendChild(div);
  });
}

generar();
</script>

</body>
</html>
