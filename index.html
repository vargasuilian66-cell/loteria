<script>
function generarCarton(seed) {
  let numeros = [];
  let usados = {};

  while (numeros.length < 25) {
    let n = Math.floor((seed * 9301 + 49297) % 233280 / 233280 * 90) + 1;
    seed++;
    if (!usados[n]) {
      numeros.push(n);
      usados[n] = true;
    }
  }

  let tabla = document.getElementById("carton");
  tabla.innerHTML = "";

  for (let i = 0; i < 5; i++) {
    let fila = "<tr>";
    for (let j = 0; j < 5; j++) {
      let num = numeros[i * 5 + j];
      fila += `<td onclick="marcar(this)">${num}</td>`;
    }
    fila += "</tr>";
    tabla.innerHTML += fila;
  }
}

function marcar(celda) {
  celda.classList.toggle("activo");
}

// 👉 GENERAR ID ÚNICO
function obtenerID() {
  let url = new URL(window.location.href);
  let id = url.searchParams.get("id");

  if (!id) {
    id = Math.random().toString(36).substring(2, 8);
    window.location.search = "?id=" + id;
  }

  return id;
}

// 👉 convertir ID en número (seed)
function idANumero(id) {
  let total = 0;
  for (let i = 0; i < id.length; i++) {
    total += id.charCodeAt(i);
  }
  return total;
}

// INICIO
let id = obtenerID();
let seed = idANumero(id);
generarCarton(seed);
</script>
